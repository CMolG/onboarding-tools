name: Bug report
description: Report a bug, regression, or unexpected behaviour.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before filing, please
        search the existing issues to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: onboarding-tools version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: e.g. 18.3.1
    validations:
      required: true

  - type: dropdown
    id: host
    attributes:
      label: Host framework
      options:
        - Vite
        - Next.js (App Router)
        - Next.js (Pages Router)
        - Remix
        - Create React App
        - Other (please describe in the reproduction)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        A minimal repository, CodeSandbox, or StackBlitz that reproduces the
        problem. Issues without a reproduction may be closed.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output / stack trace
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../blob/main/CODE_OF_CONDUCT.md).
          required: true
