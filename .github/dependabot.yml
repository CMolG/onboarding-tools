version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "jsdom"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
